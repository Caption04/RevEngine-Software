<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Accept invitation | Rev Engine</title><link rel="stylesheet" href="assets/app.css"><script defer src="assets/ui-feedback.js"></script><script defer src="assets/form-ux.js"></script><script defer src="assets/invitations.js"></script></head>
  <body class="auth-page">
    <main class="public-booking auth-wrap"><section class="public-booking-card auth-card invite-accept-card" data-invite-accept>
      <div class="brand public-booking-brand"><span class="brand-mark"><img src="assets/rev-engine-mark.png" alt="Rev Engine logo"></span><span class="brand-name">Rev Engine</span></div>
      <div class="hero-copy"><span class="eyebrow">Team invitation</span><h2 data-invite-heading>Checking your invitation…</h2><p data-invite-copy>Please wait while Rev Engine verifies this single-use link.</p></div>
      <form class="form-grid" data-invite-form hidden>
        <div class="field span-2"><label for="inviteName">Full name</label><input id="inviteName" name="name" autocomplete="name" minlength="2" required></div>
        <div class="field"><label for="invitePassword">Create password</label><input id="invitePassword" name="password" type="password" autocomplete="new-password" minlength="12" required></div>
        <div class="field"><label for="inviteConfirmPassword">Confirm password</label><input id="inviteConfirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="12" required></div>
        <div class="fc-form-actions span-2"><button class="primary-button" type="submit">Accept invitation</button></div>
        <p class="fc-form-error span-2" data-invite-message hidden></p>
      </form>
    </section></main>
  </body>
</html>
